services:

    app:
        build:
            context: ./docker
            dockerfile: Dockerfile
        container_name: api_app
        working_dir: /var/www
        ports:
            - "9001:9000"
        volumes:
            - ./docker/php.ini:/usr/local/etc/php/conf.d/php.ini
            - ./:/var/www
        env_file:
            - ./.env
        restart: always
        depends_on:
            - db
        networks:
            - api-network

    nginx:
        image: nginx:alpine
        container_name: api_nginx
        working_dir: /var/www
        restart: always
        ports:
            - "8090:80"
        volumes:
            - .:/var/www
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - api-network

    db:
        image: mysql:8.0
        container_name: api_db
        restart: always
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        ports:
            - "3311:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - api-network

volumes:
    mysql_data:
        driver: local

networks:
    api-network:
        driver: bridge
